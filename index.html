<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JARVIS AI</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#0d1117;
color:white;
}

.header{
background:#161b22;
padding:20px;
text-align:center;
font-size:32px;
font-weight:bold;
}

.chat{
height:70vh;
overflow-y:auto;
padding:20px;
}

.bot{
background:#202938;
padding:15px;
border-radius:12px;
display:inline-block;
max-width:80%;
margin-bottom:15px;
}

.input-box{
position:fixed;
bottom:0;
left:0;
right:0;
display:flex;
padding:10px;
background:#161b22;
}

input{
flex:1;
padding:15px;
font-size:18px;
border:none;
border-radius:10px;
}

button{
margin-left:10px;
padding:15px 20px;
background:#00b894;
color:white;
border:none;
border-radius:10px;
font-size:18px;
cursor:pointer;
}
</style>

</head>

<body>

<div class="header">🤖 JARVIS AI</div>

<div class="chat" id="chat">
<div class="bot">
Hello Sandip 👋<br><br>
I am your personal AI Assistant.
</div>
</div>

<div class="input-box">
<input id="msg" placeholder="Type your message...">
<button onclick="send()">Send</button>
</div>



</body>
</html>
